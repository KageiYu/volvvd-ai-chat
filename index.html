<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Aibotec. Digital Engineering AI Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Force the chat to fill the entire viewport */
        #n8n-chat,
        #n8n-chat .chat-wrapper,
        #n8n-chat [class*="chat-wrapper"],
        #n8n-chat [class*="n8n-chat"] {
            width: 100% !important;
            height: 100vh !important;
            max-width: 100% !important;
            max-height: 100% !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }

        /* Hide the floating toggle button (the chat bubble icon) */
        #n8n-chat [class*="chat-toggle"],
        #n8n-chat [class*="toggle-button"],
        #n8n-chat button[class*="toggle"] {
            display: none !important;
        }

        :root {
            --chat--color-primary: #4A7FB9;
            --chat--color-secondary: #1A1A1A;
            --chat--color-background: #F4F4F4;
            --chat--color-white: #FFFFFF;
            --chat--bubble-user-bg: var(--chat--color-secondary);
            --chat--bubble-user-text: var(--chat--color-white);
            --chat--bubble-agent-bg: var(--chat--color-white);
            --chat--bubble-agent-text: var(--chat--color-secondary);
            --chat--border-width: 1px;
            --chat--border-color: #D1D1D1;
            --chat--radius: 2px;
            --chat--font-family: 'Inter', -apple-system, sans-serif;
            --chat--header-font-weight: 800;
        }

        .n8n-chat-container { background-color: var(--chat--color-background); font-family: var(--chat--font-family); }
        .n8n-chat-agent-message { border: var(--chat--border-width) solid var(--chat--border-color) !important; border-left: 4px solid var(--chat--color-primary) !important; box-shadow: 2px 2px 0px rgba(0,0,0,0.05); border-radius: var(--chat--radius) !important; }
        .n8n-chat-user-message { background-color: var(--chat--color-secondary) !important; color: var(--chat--color-white) !important; border-radius: var(--chat--radius) !important; font-weight: 500; }
        .n8n-chat-header { background-color: var(--chat--color-white); border-bottom: 2px solid var(--chat--color-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .n8n-chat-header-title { color: var(--chat--color-secondary); font-weight: var(--chat--header-font-weight); }
        .n8n-chat-input { border: 1px solid var(--chat--color-secondary) !important; border-radius: var(--chat--radius) !important; }
        .n8n-chat-send-button { background-color: var(--chat--color-primary) !important; transition: background-color 0.2s ease; }
        .n8n-chat-send-button:hover { background-color: #355f8c !important; }
        .n8n-chat-messages-list { padding: 20px !important; gap: 15px !important; }
        .n8n-chat-agent-message { background: #ffffff !important; border: 1px solid #000 !important; padding: 15px !important; font-size: 14px; line-height: 1.6; }
        .n8n-chat-agent-message::before { content: "DIAGNOSTIC DATA"; font-size: 9px; font-weight: 900; color: var(--chat--color-primary); display: block; margin-bottom: 5px; letter-spacing: 1px; }
        .n8n-chat-input-container { padding: 15px !important; background: #fff !important; border-top: 2px solid var(--chat--color-secondary) !important; }

        /* ── Quick Reply Buttons ── */
        #quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 15px;
            background: #fff;
            border-top: 1px solid #D1D1D1;
            /* Sits inside the chat window — injected by JS below */
        }

        .qr-btn {
            background: #fff;
            color: #1A1A1A;
            border: 1px solid #1A1A1A;
            border-radius: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 7px 12px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .qr-btn:hover {
            background: #4A7FB9;
            color: #fff;
            border-color: #4A7FB9;
        }

        /* Hide the buttons after first interaction */
        #quick-replies.hidden {
            display: none;
        }
    </style>
</head>
<body>

<div id="n8n-chat"></div>

<script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    createChat({
        webhookUrl: 'https://aibotech.app.n8n.cloud/webhook/c2b4299a-3737-49f2-9aa2-06793d0e632a/chat',
        webhookConfig: { method: 'POST' },
        mode: 'fullscreen',
        showWelcomeScreen: true,
        target: '#n8n-chat',
        defaultLanguage: 'en',
        i18n: {
            en: {
                title: '🤖 Aibotec 💬',
                subtitle: 'Your AI-partnered engineering consultant. A "Technical Co-Pilot" bridging bold concepts with validated industrial reality.',
                footer: '',
                getStarted: 'New Conversation',
                inputPlaceholder: 'Type your message / Ketik pesan Anda...',
            },
        },
        initialMessages: [
            'Welcome to Volvvd Engineering. 🛠️\n\n I optimize workflows for Digital Design & Prototyping.\n\n To assist you, I need to perform a quick 5-question *technical diagnosis*. Ready to start?',
            'Selamat datang di Volvvd Engineering. 🛠️\nSaya membantu optimasi workflow untuk Digital Design & Prototyping. Ada yang bisa saya bantu?'
        ],
        allowImages: false,
    });

    // ── Quick Replies (injected manually) ──────────────────────────────────────
    const QUICK_REPLIES = [
        "Yes, let's start diagnosis.",
        "What is Volvvd?",
        "View services.",
        "Ya, mulai diagnosa.",
        "Apa itu Volvvd?",
        "Lihat layanan."
    ];

    // Wait for the chat widget DOM to be ready, then inject buttons
    function injectQuickReplies() {
        // The n8n widget renders an input container — we place our buttons just above it
        const inputContainer = document.querySelector('.chat-input') 
            || document.querySelector('[class*="chat-input"]')
            || document.querySelector('.n8n-chat-input-container');

        if (!inputContainer) {
            // Widget not rendered yet — retry
            setTimeout(injectQuickReplies, 300);
            return;
        }

        // Avoid double-injection
        if (document.getElementById('quick-replies')) return;

        const bar = document.createElement('div');
        bar.id = 'quick-replies';

        QUICK_REPLIES.forEach(label => {
            const btn = document.createElement('button');
            btn.className = 'qr-btn';
            btn.textContent = label;
            btn.addEventListener('click', () => sendQuickReply(label));
            bar.appendChild(btn);
        });

        // Insert above the input field
        inputContainer.parentNode.insertBefore(bar, inputContainer);
    }

    function sendQuickReply(text) {
        // 1. Find the textarea/input inside the widget
        const input = document.querySelector('textarea[placeholder], input[placeholder]');
        if (!input) return;

        // 2. Set the value using React's synthetic event system (needed for Vue/React inputs)
        const nativeInputValueSetter = Object.getOwnPropertyDescriptor(
            window.HTMLTextAreaElement.prototype, 'value'
        )?.set || Object.getOwnPropertyDescriptor(
            window.HTMLInputElement.prototype, 'value'
        )?.set;

        if (nativeInputValueSetter) {
            nativeInputValueSetter.call(input, text);
        } else {
            input.value = text;
        }

        // 3. Trigger input event so the widget's JS picks up the value
        input.dispatchEvent(new Event('input', { bubbles: true }));

        // 4. Small delay, then click the send button
        setTimeout(() => {
            const sendBtn = document.querySelector('button[type="submit"], .chat-send-button, [class*="send"]');
            if (sendBtn) {
                sendBtn.click();
            } else {
                // Fallback: dispatch Enter key
                input.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', bubbles: true }));
            }

            // Hide the quick reply bar after first use
            const bar = document.getElementById('quick-replies');
            if (bar) bar.classList.add('hidden');
        }, 80);
    }

    // Start watching for the widget to mount
    setTimeout(injectQuickReplies, 800);
</script>

</body>
</html>
