<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>VOLVVD Engineering AI Consultant</title>
    <style>
        
        :root {
            /* Colors */
            --chat--color-primary: #4A7FB9;      /* Volvvd Signature Blue */
            --chat--color-secondary: #1A1A1A;    /* Deep Black for text/headers */
            --chat--color-background: #F4F4F4;   /* Light Grey technical background */
            --chat--color-white: #FFFFFF;
            
            /* Message Bubbles */
            --chat--bubble-user-bg: var(--chat--color-secondary);
            --chat--bubble-user-text: var(--chat--color-white);
            --chat--bubble-agent-bg: var(--chat--color-white);
            --chat--bubble-agent-text: var(--chat--color-secondary);
            
            /* Borders & Radius */
            --chat--border-width: 1px;
            --chat--border-color: #D1D1D1;
            --chat--radius: 2px; /* Sharp technical corners, not rounded */
            
            /* Typography */
            --chat--font-family: 'Inter', -apple-system, sans-serif;
            --chat--header-font-weight: 800;
            }

            /* Base Container Styling */
            .n8n-chat-container {
            background-color: var(--chat--color-background);
            font-family: var(--chat--font-family);
            }

            /* Agent Message Styling - Technical White Paper Style */
            .n8n-chat-agent-message {
            border: var(--chat--border-width) solid var(--chat--border-color) !important;
            border-left: 4px solid var(--chat--color-primary) !important; /* Blue accent bar */
            box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
            border-radius: var(--chat--radius) !important;
            }

            /* User Message Styling - Solid Black Header Style */
            .n8n-chat-user-message {
            background-color: var(--chat--color-secondary) !important;
            color: var(--chat--color-white) !important;
            border-radius: var(--chat--radius) !important;
            font-weight: 500;
            }

            /* Chat Header - Bold Branding */
            .n8n-chat-header {
            background-color: var(--chat--color-white);
            border-bottom: 2px solid var(--chat--color-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            }

            .n8n-chat-header-title {
            color: var(--chat--color-secondary);
            font-weight: var(--chat--header-font-weight);
            }

            /* Input Field - Blueprint Style */
            .n8n-chat-input {
            border: 1px solid var(--chat--color-secondary) !important;
            border-radius: var(--chat--radius) !important;
            }

            .n8n-chat-send-button {
            background-color: var(--chat--color-primary) !important;
            transition: background-color 0.2s ease;
            }

            .n8n-chat-send-button:hover {
            background-color: #355f8c !important;
            }
            /* 1. Make the message area feel like a workspace */
            .n8n-chat-messages-list {
            padding: 20px !important;
            gap: 15px !important;
            }

            /* 2. Style the Agent bubbles to look like 'Technical Cards' */
            .n8n-chat-agent-message {
            background: #ffffff !important;
            border: 1px solid #000 !important; /* Stark engineering line */
            padding: 15px !important;
            font-size: 14px;
            line-height: 1.6;
            }

            /* 3. Add a 'Status Indicator' to Agent messages */
            .n8n-chat-agent-message::before {
            content: "DIAGNOSTIC DATA";
            font-size: 9px;
            font-weight: 900;
            color: var(--chat--color-primary);
            display: block;
            margin-bottom: 5px;
            letter-spacing: 1px;
            }

            /* 4. Improve the Input area UX */
            .n8n-chat-input-container {
            padding: 15px !important;
            background: #fff !important;
            border-top: 2px solid var(--chat--color-secondary) !important;
            }
            /* Style for Quick Reply Buttons */
            .n8n-chat-quick-reply-button {
              background-color: var(--chat--color-white) !important;
              color: var(--chat--color-secondary) !important;
              border: 1px solid var(--chat--color-secondary) !important;
              border-radius: 0px !important; /* Sharp corners for CAD feel */
              font-family: var(--chat--font-family);
              font-weight: 600;
              text-transform: uppercase;
              font-size: 11px;
              letter-spacing: 0.5px;
              padding: 8px 12px !important;
              transition: all 0.2s ease;
            }
            
            .n8n-chat-quick-reply-button:hover {
              background-color: var(--chat--color-primary) !important;
              color: white !important;
              border-color: var(--chat--color-primary) !important;
            }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
</head>
<body>

    <div id="n8n-chat"></div>

    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        createChat({
            webhookUrl: 'https://takashiide.app.n8n.cloud/webhook/c2b4299a-3737-49f2-9aa2-06793d0e632a/chat', //YOUR_N8N_PRODUCTION_WEBHOOK_URL
            webhookConfig: {
                method: 'POST'
            },
            showWelcomeScreen: true,
            title: 'Volvvd Engineering',
            subtitle: 'Digital Design & Analysis Consultant',
            initialMessages: [
                'Welcome to Volvvd Engineering. 🛠️\nI optimize workflows for Digital Design & Prototyping. How can I help you today?',
                'Selamat datang di Volvvd Engineering. 🛠️\nSaya membantu optimasi workflow untuk Digital Design & Prototyping. Ada yang bisa saya bantu?'
            ],
            // These are the buttons that appear at the bottom
            quickReplies: [
                "Yes, let's start diagnosis.",
                "What is Volvvd?",
                "View services.",
                "Ya, mulai diagnosa.",
                "Apa itu Volvvd?",
                "Lihat layanan."
            ],
            allowImages: false
        });
    </script>
</body>
</html>
